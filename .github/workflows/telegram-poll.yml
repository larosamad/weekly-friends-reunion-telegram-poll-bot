name: Telegram weekly poll

on:
  schedule:
    - cron: "0 10 * * 0"
    - cron: "0 8 * * 1"
    - cron: "0 16 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Decide mode
        run: |
          DAY=$(date -u +"%u")
          HOUR=$(date -u +"%H")

          if [ "$DAY" = "7" ] && [ "$HOUR" = "10" ]; then
            echo "MODE=start" >> $GITHUB_ENV
          elif [ "$DAY" = "1" ] && [ "$HOUR" = "08" ]; then
            echo "MODE=close_first" >> $GITHUB_ENV
          elif [ "$DAY" = "1" ] && [ "$HOUR" = "16" ]; then
            echo "MODE=close_tiebreak" >> $GITHUB_ENV
          else
            echo "MODE=start" >> $GITHUB_ENV
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: ${{ env.MODE }}
        run: python bot.py

      - name: Save poll info
        if: ${{ env.MODE == 'start' || env.MODE == 'close_first' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add poll_info.json
          git commit -m "Save poll info" || echo "No changes"
          git push
